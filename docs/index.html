<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LLM News Tracker — YouTube LLM 频道监控</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <div class="header-inner">
    <h1>🧠 LLM News Tracker</h1>
    <p class="subtitle">自动监控 YouTube LLM 频道 · AI 驱动内容分析 · 每 12 小时更新</p>
    <p class="update-time" id="update-time"></p>
  </div>
</header>

<main>
  <!-- Stats Bar -->
  <section class="stats-bar" id="stats-bar">
    <div class="stat">
      <span class="stat-value" id="stat-channels">0</span>
      <span class="stat-label">监控频道</span>
    </div>
    <div class="stat">
      <span class="stat-value" id="stat-videos">0</span>
      <span class="stat-label">分析视频</span>
    </div>
    <div class="stat">
      <span class="stat-value" id="stat-relations">0</span>
      <span class="stat-label">频道关联</span>
    </div>
  </section>

  <!-- Search & Filter -->
  <section class="controls">
    <div class="control-row">
      <input type="text" id="search-input" class="search-box"
             placeholder="搜索视频标题、摘要、主讲人或标签...">
      <select id="channel-filter" class="filter-select">
        <option value="">全部频道</option>
      </select>
    </div>
    <div class="topic-filters" id="topic-filters">
      <!-- Dynamically populated -->
    </div>
  </section>

  <!-- Video Table -->
  <section class="table-section">
    <div class="table-wrapper">
      <table id="video-table">
        <thead>
          <tr>
            <th class="col-channel">频道</th>
            <th class="col-title">视频标题</th>
            <th class="col-date">发布时间</th>
            <th class="col-views">播放量</th>
            <th class="col-topics">主题标签</th>
            <th class="col-speaker">主讲人</th>
            <th class="col-level">深度</th>
            <th class="col-summary">AI 内容摘要</th>
          </tr>
        </thead>
        <tbody id="table-body">
        </tbody>
      </table>
    </div>
    <p class="result-count" id="result-count"></p>
  </section>

  <!-- Channel Relations -->
  <section class="relations-section">
    <h2>📊 频道内容侧重 & 关联分析</h2>
    <div id="channel-focus-grid" class="focus-grid">
      <!-- Dynamically populated -->
    </div>
    <div id="relations-list" class="relations-list">
      <!-- Dynamically populated -->
    </div>
  </section>
</main>

<footer>
  <p>LLM News Tracker · Powered by Gemini AI · Auto-updated via GitHub Actions · Data refreshes every 12 hours</p>
</footer>
